# Supabase PostgreSQL
spring.datasource.url=${DB_Url}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Keep these the same
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Supabase Storage (S3-compatible)
supabase.storage.url=${S3_STORAGE_URL}
supabase.storage.access-key=${S3_ACCESS_KEY}
supabase.storage.secret-key=${S3_SECRET_KEY}
supabase.storage.bucket=${S3_BUCKET_NAME}
supabase.storage.region=${S3_REGION}
supabase.project.url=${S3_PROJECT_URL}

# Swagger ENABLED in dev
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.api-docs.path=/v3/api-docs